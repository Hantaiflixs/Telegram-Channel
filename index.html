<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Star Tv Telegram Channel Redirect</title>
  
  <style>
    :root {
      --primary-color: #00f2fe;
      --secondary-color: #4facfe;
      --bg-gradient: radial-gradient(circle, #24243e 0%, #0f0c29 100%);
    }

    /* Security: No selection, No copy, No long press */
    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-touch-callout: none; /* iOS disable long press save image */
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-gradient);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
    }

    /* Anti-Screenshot Attempt */
    @media print { body { display: none; } }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      padding: 40px 20px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .shield-icon {
      width: 80px;
      height: auto;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 10px var(--primary-color));
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      background: linear-gradient(to bottom, #fff, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .timer-display {
      font-size: 45px;
      font-weight: bold;
      color: var(--primary-color);
      margin: 20px 0;
      text-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
    }

    .link-box {
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 15px;
      border: 1px dashed rgba(255, 255, 255, 0.2);
      margin-top: 25px;
    }

    .link-box a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: bold;
      pointer-events: auto !important; /* Only this link is clickable */
    }

    /* Hit Counter - Non Clickable CSS */
    .footer-counter {
      position: fixed;
      bottom: 25px;
      pointer-events: none; /* Pure block for any clicks */
      user-select: none;
      filter: brightness(0.8) cyan-shadow(0 0 5px cyan);
    }

    .footer-counter a, .footer-counter img {
      pointer-events: none !important;
      cursor: default !important;
    }
  </style>

  <script>
    // --- SETTINGS ---
    let timeRemaining = 2.0; // Tumi ekhane 0.1 theke 9999 jekono value dite paro
    const targetUrl = "https://t.me/+SHnGrp1qjEAxMDY1";

    function initRedirect() {
      const display = document.getElementById("timer-count");
      
      const timer = setInterval(() => {
        if (timeRemaining <= 0) {
          clearInterval(timer);
          window.location.href = targetUrl;
        } else {
          display.textContent = timeRemaining.toFixed(1);
          timeRemaining -= 0.1;
        }
      }, 100);
    }

    // Security: Block Right Click, F12, Ctrl+U
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) {
      if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
        return false;
      }
    };

    window.onload = initRedirect;
  </script>
</head>
<body ondragstart="return false" onselectstart="return false">

  <div class="glass-card">
    <img src="https://img.icons8.com/fluency/96/shield.png" class="shield-icon" alt="Security Shield">
    
    <h1>Secure Gateway</h1>
    <p style="opacity: 0.6; font-size: 14px;">Verifying connection, please wait...</p>

    <div class="timer-display">
      <span id="timer-count">5.0</span><span style="font-size: 18px; margin-left: 5px;">s</span>
    </div>

    <div class="link-box">
      Link not working? <br>
      <a href="https://t.me/+SHnGrp1qjEAxMDY1">Click Here to Join</a>
    </div>

     <div class="admin-text">
      Admin Support: 
      <a href="https://t.me/Luxepremiumrobot" class="clickable-link">@Luxepremiumrobot</a>
    </div>
  </div>

  <div class="footer-counter">
    <a href="#" onclick="return false;">
      <img src="https://hitwebcounter.com/counter/counter.php?page=21491616&style=0010&nbdigits=6&type=ip&initCount=0" title="Counter" alt="Counter" style="border:0;" />
    </a>
  </div>

</body>
</html>
